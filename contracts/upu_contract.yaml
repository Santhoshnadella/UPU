# UPU Master Design Contract v1
# Generated by GuidedWizard. Injected into EVERY AI RTL generation prompt.
# Every module must comply. contract_validator.py enforces this automatically.

meta:
  design_name: "upu_top"
  process: "sky130B"
  target_frequency_mhz: 50        # 50MHz for v1 — timing-safe on sky130
  supply_voltage: 1.8
  temperature_range: [0, 85]      # °C, commercial range

# ─── INTERFACE CONTRACTS ───────────────────────────────────────────────────

axi_bus:
  version: "AXI4"
  data_width: 64
  addr_width: 32
  id_width: 4
  max_outstanding_transactions: 4
  # CRITICAL: AXI rule — valid must never depend on ready
  handshake_rule: "VALID_INDEPENDENT_OF_READY"
  # All masters must hold valid+data stable until ready asserted
  stability_rule: "HOLD_UNTIL_HANDSHAKE"
  burst_support: true
  max_burst_length: 16

axi_lite:
  data_width: 32
  addr_width: 32
  # Used for CSR (control/status registers) only — no bursts
  burst_support: false

# ─── MEMORY ARCHITECTURE ──────────────────────────────────────────────────

memory:
  # COHERENCY MODEL: No hardware coherency. DMA-only for accelerators.
  # This eliminates the entire cache coherency problem class.
  coherency_model: "DMA_ONLY_NO_SNOOPING"

  L1_icache:
    size_kb: 64
    associativity: 4
    line_size_bytes: 64
    owner: "cpu_only"             # CPU exclusive — no DMA access
    writeback: false              # Write-through to L2

  L1_dcache:
    size_kb: 64
    associativity: 4
    line_size_bytes: 64
    owner: "cpu_only"
    writeback: false

  L2_shared:
    size_kb: 256
    associativity: 8
    line_size_bytes: 64
    # Accelerators (TPU/NPU/GPU/PU) access L2 via DMA only
    # CPU accesses L2 via cache hierarchy
    # This is the ONLY shared memory. Period.
    dma_accessible: true
    cpu_accessible: true

  boot_rom:
    size_kb: 4
    owner: "cpu_only"
    preloaded: true

# ─── PIPELINE RULES ────────────────────────────────────────────────────────

pipeline:
  # TIMING RULE: No combinational path may exceed 40 gate delays.
  # At sky130 ~0.2ns/gate, 40 gates = 8ns < 20ns (50MHz period). Safe.
  max_combinational_depth_gates: 40

  # All arithmetic units (ALU, multiplier, adder) MUST have registered outputs
  arithmetic_output_registered: true

  # Systolic array: every PE must have registered input AND output
  # This makes each PE a fully pipelined 1-cycle stage
  systolic_pe_fully_pipelined: true

  # All module outputs that feed another module must be registered
  # (no combinational pass-through across module boundaries)
  cross_module_outputs_registered: true

# ─── DATA WIDTH CONTRACTS ─────────────────────────────────────────────────

data_widths:
  # Accumulator sizing: INT8×INT8 = max 127×127 = 16129
  # 64 accumulations max = 16129×64 = 1,032,256 → needs 21 bits
  # Using 32 bits = CANNOT overflow. Mathematically proven.
  tpu_accumulator_bits: 32
  tpu_input_bits: 8
  tpu_weight_bits: 8
  tpu_output_bits: 32             # Saturate to INT32, never wrap

  npu_accumulator_bits: 32
  npu_activation_bits: 8
  npu_weight_bits: 8
  npu_overflow_policy: "SATURATE" # Never WRAP — wrap is silent corruption

  gpu_lane_width: 32
  gpu_lane_count: 32
  gpu_vector_register_count: 32

  cpu_xlen: 64                    # RV64I
  cpu_flen: 64                    # Double-precision float

# ─── CLOCK DOMAIN CONTRACTS ───────────────────────────────────────────────

clocks:
  core_clk:
    frequency_mhz: 50
    uncertainty_ns: 0.5
    owner: "all_units"

  # ONE clock domain for the entire UPU v1.
  # This eliminates ALL CDC (clock domain crossing) bugs.
  # v2 can add separate DMA clock. v1 keeps it simple.
  num_domains: 1
  cdc_policy: "SINGLE_DOMAIN_NO_CDC_NEEDED"

# ─── RESET CONTRACTS ──────────────────────────────────────────────────────

reset:
  polarity: "active_low"          # rst_n
  synchronous: true               # All FFs use synchronous reset
  # Synchronous reset prevents reset glitch metastability
  async_reset_allowed: false

# ─── INTERRUPT CONTRACTS ──────────────────────────────────────────────────

interrupts:
  controller: "PLIC_simple"       # Simple PLIC, 8 sources
  sources:
    - {id: 0, name: "tpu_done",   owner: "tpu"}
    - {id: 1, name: "npu_done",   owner: "npu"}
    - {id: 2, name: "gpu_done",   owner: "gpu"}
    - {id: 3, name: "pu_done",    owner: "pu"}
    - {id: 4, name: "dma_done",   owner: "dma"}
    - {id: 5, name: "uart_rx",    owner: "uart"}
    - {id: 6, name: "timer",      owner: "timer"}
    - {id: 7, name: "gpio",       owner: "gpio"}

# ─── MEMORY MAP ───────────────────────────────────────────────────────────

memory_map:
  # Base addresses for all units (used in linker script + AXI decoder)
  boot_rom:     {base: 0x00000000, size: 0x00001000}  # 4KB
  l2_sram:      {base: 0x10000000, size: 0x00040000}  # 256KB
  cpu_csr:      {base: 0x20000000, size: 0x00001000}
  tpu_regs:     {base: 0x30000000, size: 0x00001000}
  npu_regs:     {base: 0x30001000, size: 0x00001000}
  gpu_regs:     {base: 0x30002000, size: 0x00001000}
  pu_regs:      {base: 0x30003000, size: 0x00001000}
  plic_regs:    {base: 0x40000000, size: 0x00400000}
  uart_regs:    {base: 0x50000000, size: 0x00001000}
  gpio_regs:    {base: 0x50001000, size: 0x00001000}
  timer_regs:   {base: 0x50002000, size: 0x00001000}

# ─── FLOORPLAN HINTS ──────────────────────────────────────────────────────

floorplan:
  # Placement driven by wire-length minimization.
  # L2 SRAM center. Units that access it most go nearest.
  die_size_um: [2000, 2000]       # 2mm × 2mm at sky130
  target_utilization: 0.45        # 45% — leaves room for routing
  units:
    l2_sram:  {x: 900,  y: 900,  anchor: "center"}  # Center of die
    cpu:      {x: 400,  y: 900,  anchor: "center"}  # Left of L2
    tpu:      {x: 900,  y: 400,  anchor: "center"}  # Below L2 (most L2 BW)
    npu:      {x: 1400, y: 900,  anchor: "center"}  # Right of L2
    gpu:      {x: 900,  y: 1400, anchor: "center"}  # Above L2
    pu:       {x: 400,  y: 400,  anchor: "center"}  # Corner
    l1_i:     {x: 200,  y: 700,  anchor: "center"}  # Adjacent to CPU
    l1_d:     {x: 200,  y: 1100, anchor: "center"}  # Adjacent to CPU
    boot_rom: {x: 200,  y: 200,  anchor: "center"}  # Near CPU boot path

# ─── LIBRELANE PARAMETERS ─────────────────────────────────────────────────

librelane:
  # Pre-validated parameters that guarantee timing closure at 50MHz sky130
  CLOCK_PERIOD: 20.0              # 50MHz = 20ns period
  SYNTH_STRATEGY: "DELAY 2"       # Optimize for delay (timing closure)
  SYNTH_MAX_FANOUT: 8             # Prevent high-fanout timing bombs
  FP_CORE_UTIL: 45
  FP_ASPECT_RATIO: 1
  CTS_TARGET_SKEW: 200            # 200ps skew budget (safe for 20ns period)
  CTS_CLK_BUFFER_LIST: >
    sky130_fd_sc_hd__clkbuf_4
    sky130_fd_sc_hd__clkbuf_8
    sky130_fd_sc_hd__clkbuf_16
  PL_TARGET_DENSITY: 0.45
  GLB_RT_ADJUSTMENT: 0.15         # 15% routing adjustment for congestion
  # Power delivery
  FP_PDN_VPITCH: 100
  FP_PDN_HPITCH: 100
  FP_PDN_VWIDTH: 1.6
  FP_PDN_HWIDTH: 1.6
