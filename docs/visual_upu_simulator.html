<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual UPU Silicon Simulator</title>
    <style>
        :root {
            --bg: #0a0b10;
            --die-bg: #050505;
            --trace-dim: #1a1e2a;
            --trace-active: #00f2fe;
            --trace-data: #ff00ff;
            --trace-clk: #22c55e;
            --text-primary: #e0e6ed;
            --text-accent: #4facfe;
            --panel: #111420;
            --reg-bg: #0d0f1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Fira Code', 'Monaco', monospace;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- Layout --- */
        #viewport {
            flex: 1;
            position: relative;
            background-color: var(--die-bg);
            cursor: grab;
            overflow: hidden;
            border-right: 2px solid #1a1e2e;
        }

        #ui-overlay {
            width: 450px;
            background-color: var(--panel);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        /* --- Header --- */
        header {
            padding: 20px;
            border-bottom: 2px solid #1e2540;
            background: linear-gradient(to bottom, #161b2e, #111420);
        }

        h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
            color: var(--text-accent);
            text-transform: uppercase;
        }

        .status-bar {
            font-size: 12px;
            color: #8ba2b2;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }

        /* --- Controls --- */
        .controls {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #1e2540;
        }

        .btn {
            background: #1e2540;
            border: 1px solid #3d4b7a;
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover { background: #2a345e; border-color: var(--text-accent); }
        .btn.active { background: #4facfe; color: #000; border-color: #fff; }

        /* --- Register View --- */
        .registers {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .reg-group {
            margin-bottom: 25px;
        }

        .reg-group-label {
            font-size: 11px;
            font-weight: bold;
            color: #5c6d8c;
            text-transform: uppercase;
            margin-bottom: 10px;
            border-bottom: 1px solid #1e2540;
            padding-bottom: 5px;
        }

        .reg-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .reg-label { color: #8ba2b2; }
        .reg-val { color: var(--text-accent); font-weight: bold; transition: color 0.3s; }
        .reg-val.changed { color: #fff; text-shadow: 0 0 10px var(--text-accent); }

        /* --- Memory View --- */
        #memory-view {
            height: 250px;
            background: #000;
            font-size: 11px;
            padding: 10px;
            overflow-y: auto;
            color: #4dc1ff;
            border-top: 2px solid #1a1e2e;
        }

        .mem-line { display: flex; gap: 10px; opacity: 0.8; }
        .mem-addr { color: #5c6d8c; }
        .mem-data { color: #a0aec0; }
        .mem-highlight { background: rgba(79, 172, 254, 0.3); color: #fff; }

        /* --- SVG Styles --- */
        svg {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .die-rect { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 1; }
        .trace { stroke: var(--trace-dim); stroke-width: 0.5; fill: none; transition: stroke 0.5s; }
        .trace.active { stroke: var(--trace-active); stroke-width: 1.5; filter: drop-shadow(0 0 5px var(--trace-active)); }
        .trace.data { stroke: var(--trace-data); }
        .trace.clk { stroke: var(--trace-clk); opacity: 0.2; }

        .block-label {
            font-size: 40px;
            fill: rgba(255,255,255,0.1);
            font-weight: 800;
            pointer-events: none;
            text-transform: uppercase;
        }

        .gate { fill: #1e2540; stroke: #3d4b7a; stroke-width: 1; }
        .gate.active { fill: var(--text-accent); stroke: #fff; }

        #tooltip {
            position: absolute;
            display: none;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid var(--text-accent);
        }
    </style>
</head>
<body>

<div id="viewport">
    <svg id="die-svg" viewBox="0 0 4000 3000">
        <!-- Background Grid -->
        <defs>
            <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
            </pattern>
        </defs>
        <rect width="4000" height="3000" fill="url(#grid)" />

        <!-- Blocks -->
        <g id="blocks-layer"></g>

        <!-- Traces (Generated via JS) -->
        <g id="traces-layer"></g>

        <!-- Logic Elements -->
        <g id="gates-layer"></g>
        
        <!-- Animated Packets -->
        <g id="packets-layer"></g>
    </svg>
    <div id="tooltip"></div>
</div>

<aside id="ui-overlay">
    <header>
        <h1>Visual UPU Simulator</h1>
        <div class="status-bar">
            <span id="cycle-count">Cycles: 0</span>
            <span id="sim-status">STALLED</span>
        </div>
    </header>

    <div class="controls">
        <button class="btn" onclick="stepSim()"><span>▶|</span> Step</button>
        <button class="btn" id="run-btn" onclick="toggleRun()"><span>▶</span> Run</button>
        <button class="btn" onclick="resetSim()"><span>↺</span> Reset</button>
    </div>

    <div class="registers">
        <div class="reg-group">
            <div class="reg-group-label">Core RV64_TOP</div>
            <div class="reg-row"><span class="reg-label">PC</span><span class="reg-val" id="reg-pc">0x00000000</span></div>
            <div class="reg-row"><span class="reg-label">SP</span><span class="reg-val" id="reg-sp">0x1003FFFF</span></div>
            <div class="reg-row"><span class="reg-label">INST</span><span class="reg-val" id="reg-inst">ADDI x1, x0, 1</span></div>
        </div>

        <div class="reg-group">
            <div class="reg-group-label">Accelerator Status</div>
            <div class="reg-row"><span class="reg-label">TPU_BUSY</span><span class="reg-val" id="reg-tpu">OFF</span></div>
            <div class="reg-row"><span class="reg-label">GPU_MODE</span><span class="reg-val" id="reg-gpu">IDLE</span></div>
            <div class="reg-row"><span class="reg-label">NoC_FLIT</span><span class="reg-val" id="reg-noc">READY</span></div>
        </div>

        <div class="reg-group">
            <div class="reg-group-label">Buses</div>
            <div class="reg-row"><span class="reg-label">ADDR_BUS</span><span class="reg-val" id="reg-addr">0x00000000</span></div>
            <div class="reg-row"><span class="reg-label">DATA_BUS</span><span class="reg-val" id="reg-data">0x00000000</span></div>
        </div>
    </div>

    <div id="memory-view">
        <!-- Memory lines injected here -->
    </div>
</aside>

<script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const blocks = [
        { id: 'CPU', x: 200, y: 200, w: 1200, h: 1000, label: 'RV64 Core' },
        { id: 'L2', x: 1600, y: 200, w: 2200, h: 600, label: 'L2 Shared SRAM' },
        { id: 'TPU', x: 200, y: 1400, w: 1000, h: 1000, label: 'Infinity TPU' },
        { id: 'GPU', x: 1400, y: 1400, w: 1000, h: 1000, label: 'Titan GPU' },
        { id: 'NoC', x: 2600, y: 1000, w: 1200, h: 1800, label: 'Hyper-NoC' },
        { id: 'ROM', x: 200, y: 2600, w: 1200, h: 200, label: 'Boot ROM' }
    ];

    let cycles = 0;
    let isRunning = false;
    let runInterval = null;
    let pc = 0;

    const memory = Array(64).fill(0).map(() => Math.floor(Math.random() * 0xFFFFFFFF));

    function initSVG() {
        const blkLayer = document.getElementById('blocks-layer');
        const traceLayer = document.getElementById('traces-layer');
        const gateLayer = document.getElementById('gates-layer');

        // Draw blocks
        blocks.forEach(b => {
            const rect = document.createElementNS(SVG_NS, "rect");
            rect.setAttribute("x", b.x); rect.setAttribute("y", b.y);
            rect.setAttribute("width", b.w); rect.setAttribute("height", b.h);
            rect.setAttribute("class", "die-rect");
            blkLayer.appendChild(rect);

            const txt = document.createElementNS(SVG_NS, "text");
            txt.setAttribute("x", b.x + 20); txt.setAttribute("y", b.y + b.h - 20);
            txt.setAttribute("class", "block-label");
            txt.textContent = b.label;
            blkLayer.appendChild(txt);

            // Generate "Transistor" noise inside block
            for (let i = 0; i < (b.w * b.h) / 20000; i++) {
                const g = document.createElementNS(SVG_NS, "rect");
                g.setAttribute("x", b.x + Math.random() * b.w);
                g.setAttribute("y", b.y + Math.random() * b.h);
                g.setAttribute("width", 5 + Math.random() * 20);
                g.setAttribute("height", 2);
                g.setAttribute("class", "gate");
                gateLayer.appendChild(g);
            }
        });

        // Generate massive trace mesh
        for (let i = 0; i < 800; i++) {
            const p = document.createElementNS(SVG_NS, "path");
            const startX = Math.random() * 4000;
            const startY = Math.random() * 3000;
            const segments = 2 + Math.floor(Math.random() * 4);
            let d = `M ${startX} ${startY}`;
            let curX = startX, curY = startY;
            
            for (let j = 0; j < segments; j++) {
                const dir = Math.random() > 0.5;
                const len = 50 + Math.random() * 300;
                if (dir) curX += (Math.random() > 0.5 ? len : -len);
                else curY += (Math.random() > 0.5 ? len : -len);
                d += ` L ${curX} ${curY}`;
            }

            p.setAttribute("d", d);
            p.setAttribute("class", "trace");
            if (i % 50 === 0) p.classList.add("clk");
            traceLayer.appendChild(p);
        }

        // Draw major BUSES
        drawBus(800, 200, 800, 2600, "BUS_CPU_ROM");
        drawBus(1400, 700, 2600, 1000, "BUS_CPU_NOC");
        drawBus(1200, 1800, 1400, 1800, "BUS_TPU_GPU");
    }

    function drawBus(x1, y1, x2, y2, id) {
        const traceLayer = document.getElementById('traces-layer');
        for (let i = -15; i <= 15; i += 5) {
            const p = document.createElementNS(SVG_NS, "path");
            let d = `M ${x1 + i} ${y1} L ${x2 + i} ${y2}`;
            p.setAttribute("d", d);
            p.setAttribute("class", "trace");
            p.setAttribute("id", `${id}_${i}`);
            traceLayer.appendChild(p);
        }
    }

    function stepSim() {
        cycles++;
        pc += 4;
        updateUI();
        animateTrace();
    }

    function updateUI() {
        document.getElementById('cycle-count').innerText = `Cycles: ${cycles}`;
        document.getElementById('reg-pc').innerText = `0x${pc.toString(16).padStart(8, '0')}`;
        document.getElementById('reg-addr').innerText = `0x${pc.toString(16).padStart(8, '0')}`;
        document.getElementById('reg-data').innerText = `0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16)}`;
        
        const insts = ["ADDI x1, x0, 1", "LUI a0, 0x1000", "VADD v1, v2, v3", "TPU_START", "BEQ x1, x2, loop"];
        document.getElementById('reg-inst').innerText = insts[cycles % insts.length];

        renderMemory();
    }

    function renderMemory() {
        const memBox = document.getElementById('memory-view');
        memBox.innerHTML = '';
        const offset = Math.floor(pc / 16) % (memory.length / 4);
        
        for (let i = 0; i < 15; i++) {
            const line = document.createElement('div');
            line.className = 'mem-line';
            if (i === 0) line.classList.add('mem-highlight');
            
            const addr = (pc + i*4).toString(16).padStart(8, '0');
            const data = memory[(offset + i) % memory.length].toString(16).padStart(8, '0');
            
            line.innerHTML = `<span class="mem-addr">${addr}:</span> <span class="mem-data">${data}</span>`;
            memBox.appendChild(line);
        }
    }

    function animateTrace() {
        // Clear old activations
        document.querySelectorAll('.trace.active').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.gate.active').forEach(t => t.classList.remove('active'));

        // Pick path based on PC
        let pathId = "BUS_CPU_ROM";
        if (cycles % 4 === 1) pathId = "BUS_CPU_NOC";
        if (cycles % 4 === 2) pathId = "BUS_TPU_GPU";

        const traces = document.querySelectorAll(`[id^="${pathId}"]`);
        traces.forEach(t => t.classList.add('active'));

        // Random gate activity in relevant block
        const blockId = pathId.split('_')[1];
        const gates = document.querySelectorAll('#gates-layer .gate');
        for (let i = 0; i < 50; i++) {
            gates[Math.floor(Math.random() * gates.length)].classList.add('active');
        }

        // Pulse packets
        for (let i = 0; i < 3; i++) {
            const circle = document.createElementNS(SVG_NS, "circle");
            circle.setAttribute("r", 4);
            circle.setAttribute("fill", "#ff00ff");
            const path = traces[Math.floor(Math.random() * traces.length)];
            const animate = document.createElementNS(SVG_NS, "animateMotion");
            animate.setAttribute("dur", "0.5s");
            animate.setAttribute("repeatCount", "1");
            animate.setAttribute("path", path.getAttribute('d'));
            circle.appendChild(animate);
            document.getElementById('packets-layer').appendChild(circle);
            setTimeout(() => circle.remove(), 500);
        }
    }

    function toggleRun() {
        isRunning = !isRunning;
        const btn = document.getElementById('run-btn');
        if (isRunning) {
            btn.classList.add('active');
            btn.innerHTML = "<span>||</span> Pause";
            document.getElementById('sim-status').innerText = "RUNNING";
            runInterval = setInterval(stepSim, 200);
        } else {
            btn.classList.remove('active');
            btn.innerHTML = "<span>▶</span> Run";
            document.getElementById('sim-status').innerText = "HALTED";
            clearInterval(runInterval);
        }
    }

    function resetSim() {
        cycles = 0; pc = 0;
        if (isRunning) toggleRun();
        updateUI();
        document.querySelectorAll('.trace.active').forEach(t => t.classList.remove('active'));
    }

    // Zoom/Pan logic
    let isPanning = false;
    let startPoint = { x: 0, y: 0 };
    let viewBox = { x: 0, y: 0, w: 4000, h: 3000 };

    const svg = document.getElementById('die-svg');
    svg.addEventListener('mousedown', e => { isPanning = true; startPoint = { x: e.clientX, y: e.clientY }; svg.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', e => {
        if (!isPanning) return;
        const dx = (e.clientX - startPoint.x) * (viewBox.w / svg.clientWidth);
        const dy = (e.clientY - startPoint.y) * (viewBox.h / svg.clientHeight);
        viewBox.x -= dx;
        viewBox.y -= dy;
        svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        startPoint = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mouseup', () => { isPanning = false; svg.style.cursor = 'grab'; });

    window.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 1.1 : 0.9;
        const newW = viewBox.w * factor;
        const newH = viewBox.h * factor;
        viewBox.x -= (newW - viewBox.w) / 2;
        viewBox.y -= (newH - viewBox.h) / 2;
        viewBox.w = newW; viewBox.h = newH;
        svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
    });

    initSVG();
    updateUI();
</script>

</body>
</html>
